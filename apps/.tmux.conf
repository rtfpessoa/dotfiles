# Use Ctrl+A as the prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Better responsiveness
set -sg escape-time 0

# Mouse support (scroll, select panes, resize, etc.)
set -g mouse on

# Larger scrollback
set -g history-limit 1000000

# Vim keys in copy mode
setw -g mode-keys vi

# Start windows and panes at 1 (optional, many people prefer it)
set -g base-index 1
setw -g pane-base-index 1

# Keep splits consistent
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill without prompting for confirmation
bind x kill-pane
bind q kill-session

# Easy reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Quality of life: re-number windows when one is closed
set -g renumber-windows on

# Copy to macOS clipboard when you press y in copy mode
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Optional: also copy on Enter, if you like that muscle memory
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

bind-key C-l send-keys C-l \; clear-history
